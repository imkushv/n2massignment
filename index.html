<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  #root { max-width: 780px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

  button {
    cursor: pointer; border: 1px solid #d0cfc8; background: #fff;

    color: #1a1a1a; transition: background .12s;

  button:hover { background: #f0eff8; }

  button.success { background: #2E7D32; color: #fff; border-color: #2E7D32; }

  { id: "shoulder", label: "What can you make out about the placement of the shoulder point?" },
  { id: "hem",      label: "What can you understand about the hem here?" },
  { id: "fabric",   label: "What fabrics do you recommend making this garment in?" },
];

const PRIORITY_TASKS = [
  "Fabric swatch approval pending from vendor",
  "Sample photoshoot scheduled for tomorrow",
  "Tech pack revision requested by designer",
  "New trim sourcing research",
  "Production tracker update overdue by 2 days",
  "Courier for bulk shipment to be booked today",
];

const IDEAL_PRIO = [2, 1, 5, 6, 3, 4];

const ACCEPTED_ANSWERS = {
  "Silhouette":     ["a-line", "a line", "aline"],
  "Neckline":       ["round neck", "round neckline", "crew neck"],
  "Sleeve Type":    ["sleeveless", "cap sleeve", "cap sleeves", "no sleeve", "without sleeve"],
  "Hem Finish":     ["double fold", "double-fold", "double fold hem", "double-fold hem", "turned hem", "clean hem"],
  "Fabric Content": ["cotton", "crepe", "blend", "georgette", "linen", "viscose", "rayon", "natural fabric"],
};

const PRIO_MARKS = [
  { label: "Photoshoot ranked 1st",           check: v => v[1] === 1 },
  { label: "Vendor swatch ranked 1st or 2nd", check: v => v[0] === 1 || v[0] === 2 },
  { label: "Tracker ranked 1st, 2nd or 3rd",  check: v => v[4] >= 1 && v[4] <= 3 },
  { label: "Research ranked 5th or 6th",       check: v => v[3] >= 5 },
];

function scoreSubmission(sub) {
  // Task 1 is open-ended — scored manually by evaluator (out of 6, stored in sub.garmentScore)
  const garmentScore = sub.garmentScore || 0;
  const vals = PRIORITY_TASKS.map((_, i) => Number(sub.priorityOrder[i]));
  const prioScore = PRIO_MARKS.filter(m => m.check(vals)).length;
  return { garmentScore, prioScore, total: garmentScore + prioScore };
}

function loadSubmissions() {
  try { return JSON.parse(localStorage.getItem("ntm_submissions") || "[]"); } catch { return []; }
}
function saveSubmissions(arr) {
  localStorage.setItem("ntm_submissions", JSON.stringify(arr));
}

function ScoreBadge({ score, max }) {
  const pct = score / max;
  const cls = pct >= 0.8 ? "badge-green" : pct >= 0.5 ? "badge-yellow" : "badge-red";
  return <span className={`badge ${cls}`}>{score}/{max}</span>;
}

    if (!info.course.trim()) e.course = "Required";
    if (!info.email.trim()) e.email = "Required";
    else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(info.email)) e.email = "Invalid email";
    if (!info.mobile.trim()) e.mobile = "Required";
    else if (!/^[0-9+\s\-]{7,15}$/.test(info.mobile.trim())) e.mobile = "Invalid mobile number";
    setErrors(e); return Object.keys(e).length === 0;
  };
  const validateStep1 = () => {
    const e = {};
    GARMENT_QUESTIONS.forEach(q => { if (!garmentAnswers[q.id]?.trim()) e[q.id] = "Please answer this question"; });
    setErrors(e); return Object.keys(e).length === 0;
  };
  const validateStep2 = () => {
    const e = {};
    const vals = Object.values(priorities).map(Number);
    if (vals.length < PRIORITY_TASKS.length) e.priorities = "Please rank all tasks";
    else if (new Set(vals).size !== PRIORITY_TASKS.length) e.priorities = "Each number must be unique (1–6)";
    if (!reasoning.trim()) e.reasoning = "Please add your reasoning";
    setErrors(e); return Object.keys(e).length === 0;
  };
  const handleNext = () => {
    if (step === 0 && !validateStep0()) return;
    if (step === 1 && !validateStep1()) return;
    setStep(s => s + 1); setErrors({});
  };
  const handleSubmit = () => {
    if (!validateStep2()) return;
    const submission = {
      id: Date.now().toString(), submittedAt: new Date().toISOString(),
      candidate: info, garmentAnswers: garmentAnswers,
      priorityOrder: priorities, priorityReasoning: reasoning,
    };
    // Save to localStorage (backup)
    const all = loadSubmissions();
    all.push(submission);
    saveSubmissions(all);

    // Send to Google Sheets
    const prioOrder = PRIORITY_TASKS.map((_,i) => priorities[i]||"").join(", ");
    const payload = {
      name: info.name, institute: info.institute, course: info.course,
      email: info.email, mobile: info.mobile,
      shoulder: (garmentAnswers.shoulder||""),
      hem: (garmentAnswers.hem||""),
      fabric: (garmentAnswers.fabric||""),
      priorityOrder: prioOrder,
      reasoning: reasoning,
    };
    try {
      await fetch("https://script.google.com/macros/s/AKfycbx8CEbApDK91ln-drVqTUAt0RKHNEIwsNJiIX4Yfm6tvpKvDQP-vQHdXQOAxEWprNLp8g/exec", {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
    } catch(err) {
      console.warn("Sheet sync failed:", err);
    }

    setSubmitted(true);
    onSubmit && onSubmit();
  };

  if (submitted) return (
    <div style={{ textAlign: "center", padding: "3rem 1rem" }}>
      <div className="success-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <p style={{ fontSize: 18, fontWeight: 500, marginBottom: 8 }}>Assignment submitted!</p>
      <p className="muted" style={{ fontSize: 14 }}>Thank you, {info.name}. Your responses have been recorded.</p>
    </div>
  );

  const stepLabels = ["Your details", "Tech pack review", "Prioritisation"];
  return (
    <div>
      <div className="card" style={{ marginBottom: 20 }}>
        <p style={{ fontWeight: 500, fontSize: 13, color: "#555" }}>Production Assistant — On-spot Assignment</p>
        <p style={{ fontSize: 11, color: "#aaa", marginTop: 2 }}>None Two Many &nbsp;·&nbsp; 12–15 minutes</p>
        <div className="step-bar">
          {stepLabels.map((label, i) => (
            <div className="step-item" key={i}>
              <div className={`step-line ${i <= step ? "active" : ""}`}/>
              <span className={`step-name ${i === step ? "active" : ""}`}>{label}</span>
            </div>
          ))}
        </div>
      </div>

      {step === 0 && (
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          <p style={{ fontWeight: 500, fontSize: 15 }}>Tell us about yourself</p>
          {[["name","Full name","text"],["institute","Institute / College","text"],["course","Course name","text"],["email","Email address","email"],["mobile","Mobile number","tel"]].map(([key, label, type]) => (
            <div key={key}>
              <label className="label">{label}</label>
              <input type={type} value={info[key]} className={errors[key] ? "err" : ""}
                onChange={e => setInfo({...info,[key]:e.target.value})} placeholder={label}/>
              {errors[key] && <div className="err-msg">{errors[key]}</div>}
            </div>
          ))}
        </div>
      )}

      {step === 1 && (
        <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
          <div>
            <p style={{ fontWeight: 500, fontSize: 15, marginBottom: 4 }}>Task 1 — Garment observation</p>
            <p style={{ fontSize: 13, color: "#555" }}>Study the garment flat carefully and answer the three questions below.</p>
          </div>
          <div className="card-purple">
            <p style={{ fontSize: 12, fontWeight: 500, textAlign: "center", color: "#534AB7", marginBottom: 10 }}>None Two Many — Oversized Tee (front &amp; back)</p>
            <GarmentImage/>
          </div>
          {GARMENT_QUESTIONS.map((q, i) => (
            <div key={q.id}>
              <label className="label" style={{ fontWeight: 500, color: "#333" }}>
                Q{i+1}. {q.label}
              </label>
              <textarea
                rows={3}
                value={garmentAnswers[q.id]||""}
                className={errors[q.id]?"err":""}
                onChange={e => setGarmentAnswers({...garmentAnswers,[q.id]:e.target.value})}
                placeholder="Write your answer here..."
              />
              {errors[q.id] && <div className="err-msg">{errors[q.id]}</div>}
            </div>
          ))}
        </div>
      )}

      {step === 2 && (
        <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
          <div>
            <p style={{ fontWeight: 500, fontSize: 15, marginBottom: 4 }}>Task 2 — Prioritisation</p>
            <p style={{ fontSize: 13, color: "#555" }}>Assign a priority number (1 = most urgent, 6 = least urgent). Each number can only be used once.</p>
          </div>
          {errors.priorities && <div style={{ fontSize: 13, color: "#c0392b", background: "#fff0f0", padding: "8px 12px", borderRadius: 8 }}>{errors.priorities}</div>}
          <div className="table-wrap">
            <div className="table-header" style={{ gridTemplateColumns: "1fr 90px" }}>
              <span>Task</span><span style={{ textAlign: "center" }}>Priority (1–6)</span>
            </div>
            {PRIORITY_TASKS.map((task, i) => (
              <div key={i} className="table-row" style={{ gridTemplateColumns: "1fr 90px" }}>
                <span style={{ fontSize: 13 }}>{task}</span>
                <select value={priorities[i]||""} onChange={e => setPriorities({...priorities,[i]:e.target.value})}
                  style={{ textAlign: "center", fontSize: 13 }}>
                  <option value="">—</option>
                  {[1,2,3,4,5,6].map(n => <option key={n} value={n}>{n}</option>)}
                </select>
              </div>
            ))}
          </div>
          <div>
            <label className="label">Your reasoning (1–2 lines)</label>
            <textarea value={reasoning} onChange={e => setReasoning(e.target.value)} rows={3}
              className={errors.reasoning?"err":""} placeholder="Explain how you decided your order..."/>
            {errors.reasoning && <div className="err-msg">{errors.reasoning}</div>}
          </div>
        </div>
      )}

      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 24, paddingTop: 16, borderTop: "1px solid #e8e7e0" }}>
        {step > 0 ? <button onClick={() => { setStep(s=>s-1); setErrors({}); }}>← Back</button> : <span/>}
        {step < 2
          ? <button className="primary" onClick={handleNext}>Next →</button>
          : <button className="success" onClick={handleSubmit}>Submit assignment</button>}
      </div>
    </div>
  );
}

function AdminDashboard() {
  const [submissions, setSubmissions] = useState([]);
  const [selected, setSelected] = useState(null);
  const [adminUnlocked, setAdminUnlocked] = useState(false);
  const [pwInput, setPwInput] = useState("");
  const ADMIN_PASSWORD = "ntm2024";

  useEffect(() => { setSubmissions(loadSubmissions()); }, []);

  const exportCSV = () => {
    const header = ["Name","Institute","Course","Email","Mobile","Submitted At","Garment Score (manual)","Priority Score","Total Score",
      "Q1 - Shoulder point","Q2 - Hem","Q3 - Fabric recommendation","Priority Order","Reasoning"];
    const rows = submissions.map(s => {
      const sc = scoreSubmission(s);
      const prioOrder = PRIORITY_TASKS.map((_,i) => s.priorityOrder[i]||"").join("|");
      const ga = s.garmentAnswers || {};
      return [s.candidate.name, s.candidate.institute, s.candidate.course||"", s.candidate.email, s.candidate.mobile||"",
        new Date(s.submittedAt).toLocaleString(), sc.garmentScore, sc.prioScore, sc.total,
        ga.shoulder||"", ga.hem||"", ga.fabric||"", prioOrder, s.priorityReasoning];
    });
    const csv = [header,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a.download = "ntm_submissions.csv"; a.click();
  };

  const clearAll = () => {
    if (!confirm("Delete all submissions? This cannot be undone.")) return;
    localStorage.removeItem("ntm_submissions");
    setSubmissions([]); setSelected(null);
  };

  if (!adminUnlocked) return (
    <div style={{ maxWidth: 360, margin: "3rem auto", textAlign: "center" }}>
      <div className="card">
        <p style={{ fontWeight: 500, marginBottom: 4 }}>Admin access</p>
        <p style={{ fontSize: 13, color: "#777", marginBottom: 16 }}>Enter the admin password to view responses.</p>
        <input type="password" value={pwInput} onChange={e=>setPwInput(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&(pwInput===ADMIN_PASSWORD?setAdminUnlocked(true):alert("Incorrect password"))}
          placeholder="Password" style={{ marginBottom: 10 }}/>
        <button className="primary" style={{ width: "100%" }}
          onClick={()=>pwInput===ADMIN_PASSWORD?setAdminUnlocked(true):alert("Incorrect password")}>
          Unlock
        </button>
        <p style={{ fontSize: 11, color: "#bbb", marginTop: 12 }}>Default password: ntm2024 — change in the HTML file</p>
      </div>
    </div>
  );

  if (selected) {
    const s = selected;
    const sc = scoreSubmission(s);
    return (
      <div>
        <button onClick={()=>setSelected(null)} style={{ marginBottom: 16 }}>← Back to list</button>
        <div className="card" style={{ marginBottom: 16, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <p style={{ fontWeight: 500 }}>{s.candidate.name}</p>
            <p style={{ fontSize: 13, color: "#777" }}>{s.candidate.institute} · {s.candidate.course}</p>
            <p style={{ fontSize: 13, color: "#777" }}>{s.candidate.email} · {s.candidate.mobile}</p>
            <p style={{ fontSize: 11, color: "#bbb", marginTop: 4 }}>{new Date(s.submittedAt).toLocaleString()}</p>
          </div>
          <div style={{ textAlign: "right" }}>
            <p style={{ fontSize: 24, fontWeight: 500 }}>{sc.total}<span style={{ fontSize: 13, color: "#777" }}>/10</span></p>
            <ScoreBadge score={sc.total} max={10}/>
          </div>
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
          <p style={{ fontWeight: 500, fontSize: 14 }}>Task 1 — Garment observation <span style={{ fontWeight: 400, color: "#777", fontSize: 13 }}>({sc.garmentScore}/6 — manual)</span></p>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <label style={{ fontSize: 12, color: "#777" }}>Award score:</label>
            <select value={sc.garmentScore} onChange={e => {
              const updated = submissions.map(x => x.id===s.id ? {...x, garmentScore: Number(e.target.value)} : x);
              saveSubmissions(updated); setSubmissions(updated);
              setSelected({...s, garmentScore: Number(e.target.value)});
            }} style={{ width: 70, fontSize: 13 }}>
              {[0,1,2,3,4,5,6].map(n=><option key={n} value={n}>{n}/6</option>)}
            </select>
          </div>
        </div>
        <div className="table-wrap" style={{ marginBottom: 20 }}>
          {GARMENT_QUESTIONS.map((q,i) => (
            <div key={q.id} style={{ padding: "12px 14px", borderTop: i>0?"1px solid #e8e7e0":"none", background: i%2===0?"#fff":"#faf9f7" }}>
              <p style={{ fontSize: 12, fontWeight: 500, color: "#4A4A8A", marginBottom: 4 }}>Q{i+1}. {q.label}</p>
              <p style={{ fontSize: 13, color: "#333" }}>{(s.garmentAnswers||{})[q.id] || <span style={{color:"#bbb"}}>No answer given</span>}</p>
            </div>
          ))}
        </div>

        <p style={{ fontWeight: 500, fontSize: 14, marginBottom: 8 }}>Task 2 — Prioritisation <span style={{ fontWeight: 400, color: "#777", fontSize: 13 }}>({sc.prioScore}/4)</span></p>
        <div className="table-wrap" style={{ marginBottom: 12 }}>
          <div className="table-header" style={{ gridTemplateColumns: "1fr 55px 60px 28px" }}>
            {["Task","Given","Ideal",""].map(h=><span key={h}>{h}</span>)}
          </div>
          {PRIORITY_TASKS.map((task,i)=>{
            const given = Number(s.priorityOrder[i]);
            const ideal = IDEAL_PRIO[i];
            const diff = Math.abs(given-ideal);
            const exact = diff===0; const close = diff===1;
            const col = exact?"#2E7D32":close?"#E65100":"#c0392b";
            return (
              <div key={i} className="table-row" style={{ gridTemplateColumns: "1fr 55px 60px 28px" }}>
                <span style={{ fontSize: 13 }}>{task}</span>
                <span style={{ fontSize: 13, fontWeight: 500, textAlign: "center", color: col }}>{given||"—"}</span>
                <span style={{ fontSize: 12, textAlign: "center", color: "#aaa" }}>{ideal}</span>
                <span style={{ textAlign: "center", fontSize: 13, color: col }}>{exact?"✓":close?"~":"✗"}</span>
              </div>
            );
          })}
        </div>
        <div className="table-wrap" style={{ marginBottom: 12 }}>
          <div className="table-header" style={{ gridTemplateColumns: "1fr 28px" }}>
            <span>Scoring criterion</span><span></span>
          </div>
          {(() => {
            const vals = PRIORITY_TASKS.map((_,i)=>Number(s.priorityOrder[i]));
            return PRIO_MARKS.map((m,i)=>{
              const pass = m.check(vals);
              return (
                <div key={i} className="table-row" style={{ gridTemplateColumns: "1fr 28px" }}>
                  <span style={{ fontSize: 13 }}>{m.label}</span>
                  <span style={{ textAlign: "center", fontSize: 14, color: pass?"#2E7D32":"#c0392b" }}>{pass?"✓":"✗"}</span>
                </div>
              );
            });
          })()}
        </div>
        <div className="card" style={{ fontStyle: "italic", fontSize: 13, color: "#555" }}>
          "{s.priorityReasoning}"
        </div>
      </div>
    );
  }

  const sorted = [...submissions].sort((a,b)=>scoreSubmission(b).total-scoreSubmission(a).total);
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
        <div>
          <p style={{ fontWeight: 500, fontSize: 15 }}>Responses ({submissions.length})</p>
          <p style={{ fontSize: 12, color: "#aaa" }}>Sorted by score, highest first</p>
        </div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={exportCSV} disabled={submissions.length===0}>Export CSV</button>
          <button className="danger" onClick={clearAll} disabled={submissions.length===0}>Clear all</button>
        </div>
      </div>
      {submissions.length===0
        ? <div style={{ textAlign: "center", padding: "3rem 1rem", color: "#aaa", fontSize: 14 }}>No submissions yet.</div>
        : sorted.map((s,i)=>{
            const sc = scoreSubmission(s);
            return (
              <div key={s.id} className="candidate-row" onClick={()=>setSelected(s)}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ width: 28, height: 28, borderRadius: "50%", background: "#f0eff8", fontSize: 12,
                    fontWeight: 500, display: "flex", alignItems: "center", justifyContent: "center", color: "#777", flexShrink: 0 }}>
                    #{i+1}
                  </span>
                  <div>
                    <p style={{ fontWeight: 500, fontSize: 14 }}>{s.candidate.name}</p>
                    <p style={{ fontSize: 12, color: "#777" }}>{s.candidate.institute}</p>
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ fontSize: 18, fontWeight: 500 }}>{sc.total}<span style={{ fontSize: 12, color: "#aaa" }}>/10</span></span>
                  <ScoreBadge score={sc.total} max={10}/>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aaa" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
                </div>
              </div>
            );
          })
      }
    </div>
  );
}

function App() {
  const [view, setView] = useState("candidate");
  const [refreshKey, setRefreshKey] = useState(0);
  return (
    <div>
      <div style={{ background: "#4A4A8A", padding: "14px 20px", borderRadius: 12, marginBottom: 20, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div>
          <p style={{ color: "#fff", fontWeight: 500, fontSize: 15 }}>None Two Many</p>
          <p style={{ color: "#CECBF6", fontSize: 12 }}>Production Assistant — Placement Drive</p>
        </div>
        <span style={{ background: "#F5A623", color: "#fff", fontSize: 12, fontWeight: 500, padding: "4px 10px", borderRadius: 6 }}>12–15 mins</span>
      </div>
      <div className="tabs">
        {[["candidate","Candidate form"],["admin","Admin — view responses"]].map(([v,label])=>(
          <button key={v} className={`tab ${view===v?"active":""}`} onClick={()=>setView(v)}>{label}</button>
        ))}
      </div>
      {view==="candidate"
        ? <CandidateForm key={refreshKey} onSubmit={()=>setRefreshKey(k=>k+1)}/>
        : <AdminDashboard/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
